<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <section class="register-section">
        <form class="register-form" novalidate>
            <h1>Đăng Ký Tài Khoản</h1>

            <label for="fullname">Họ và tên</label>
            <input id="fullname" type="text" placeholder="Nhập họ và tên" required>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Nhập email" required>

            <label for="age">Độ tuổi</label>
            <input id="age" type="number" min="1" max="120" placeholder="Nhập độ tuổi" required>

            <label>Giới Tính</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" value="nam" checked> Nam</label>
                <label><input type="radio" name="gender" value="nu"> Nữ</label>
                <label><input type="radio" name="gender" value="khac"> Giới tính khác</label>
            </div>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Nhập mật khẩu" required>

            <label for="confirm">Xác nhận password</label>
            <input id="confirm" type="password" placeholder="Nhập lại mật khẩu" required>

            <button type="submit">Đăng Ký</button>  
            <button type="submit">QMK</button>
            

            <p class="login-hint">Đã có tài khoản? <a href="#">Đăng nhập</a></p>
        </form>
    </section>
    <script src="chucNang.js"></script>
</body>
</html>
